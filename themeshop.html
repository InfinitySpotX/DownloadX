<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Infinity Themes</title>

<link rel="stylesheet" href="themeshop.css">

</head>

<body>

<div class="bg"></div>
<div class="theme-screen">

<h1>🎨 THEME SHOP</h1>

<p class="subtitle">Unlock themes with your Best Score
</p>

<!-- NIGHT -->

<div class="theme-card">
<div class="left">
<div class="preview night"></div>

<div>
<h3>🌙 Night</h3>
<p>Default Theme</p>

</div>

</div>

<button class="select" onclick="selectThemeDefault()">SELECT</button>

</div>

<!-- LAVA -->

<div class="theme-card">
<div class="left">
<div class="preview lava preview-lava"></div>

<div>
<h3>🌋 Lava</h3>
<p>Unlock : 500</p>

</div>

</div>

<button id="lavaBtn" class="lock">500 🔒</button>

</div>

<!-- GALAXY -->

<div class="theme-card">
<div class="left">
<div class="preview galaxy preview-galaxy"></div>

<div>
<h3>🌌 Galaxy</h3>
<p>Unlock : 2000</p>

</div>

</div>

<button id="galaxyBtn"class="lock">2000 🔒</button>

</div>

<!-- SNOW -->

<div class="theme-card">
<div class="left">
<div class="preview snow preview-snow"></div>

<div>
<h3>❄ Snow</h3>
<p>Unlock : 3500</p>

</div>

</div>

<button id="snowBtn"class="lock">3500 🔒</button>

</div>

<!-- FOREST -->

<div class="theme-card">
<div class="left">
<div class="preview forest preview-forest"></div>

<div>
<h3>🌲 Forest</h3>
<p>Unlock : 5000</p>

</div>

</div>

<button id="forestBtn" class="lock">5000 🔒</button>

</div>

<button class="back" onclick="history.back()">⬅ BACK</button>

 </div>

<script src="themeshop.js"></script>
<script src="game.js"></script>
</body>
</html>
